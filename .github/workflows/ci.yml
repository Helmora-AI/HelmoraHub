name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: helmora-hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high
